<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: system-ui; width: 320px; padding: 12px; margin: 0; background: #0b0f19; color: white; }
    h3 { margin: 0 0 12px; font-size: 16px; color: #3b82f6; display: flex; align-items: center; gap: 8px;}
    .status { padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 12px; font-size: 14px;}
    .status.online { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e;}
    .status.offline { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444;}
    .controls { display: flex; flex-direction: column; gap: 10px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px;}
    .controls label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    .streams-list { margin-top: 12px; font-size: 12px;}
    .stream-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 8px;}
    .stream-item:last-child { border-bottom: none; }
    .stream-url { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; direction: rtl; text-align: left;}
    button { background: #2563eb; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;}
    button:hover { background: #1d4ed8; }
    .icon { width: 16px; height: 16px; border-radius: 4px; background: #3b82f6;}
  </style>
</head>
<body>
  <h3><div class="icon"></div> Nexus Manager</h3>
  <div id="status" class="status offline">Checking Connection...</div>
  
  <div class="controls">
    <label>
      <input type="checkbox" id="interceptToggle">
      Enable Download Interception
    </label>
    <label style="opacity: 0.6; cursor: not-allowed;" title="Coming in future update">
      <input type="checkbox" id="autoCaptureToggle" disabled>
      Auto-Capture Downloads (Bypass popup)
    </label>
  </div>
  
  <div class="streams-list">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <b style="font-size: 13px; color: #9ca3af;">Detected Media Streams</b>
      <button id="refreshStreams" style="padding: 2px 8px;">↻</button>
    </div>
    <div id="streamsContainer" style="background: rgba(0,0,0,0.2); border-radius: 6px; padding: 8px;">No streams detected yet.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
